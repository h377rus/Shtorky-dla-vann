<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Личный кабинет</title>
  <link rel="stylesheet" href="portfolio.css">
</head>
<body>
  <header>
    <h1 class="logo">Личный кабинет</h1>
  </header>
  <a id ='home' href="index.html"><p>Главная</p></a>
  <div class="login-box">
    <p class="text">Для доступа нужно пройти регистрацию</p>
    
    <input type="text" id="username" class="input" placeholder="Имя пользователя">
    <div class="warning" id="warning"></div>
    
    <input type="password" id="password" class="input" placeholder="Пароль">
    
    <button id="loginBtn" class="btn">Войти 💼</button>
    
    <div id="status" class="status"></div>
  </div>

  <script src="portfolio.js"></script>
</body>
</html>
